<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Team Nox</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron', sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#060606;
color:white;
overflow-x:hidden;
}

/* PARTICLE CANVAS */

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
position:sticky;
top:0;
}

.logo img{
height:40px;
}

.nav-links a{
margin:0 15px;
text-decoration:none;
color:white;
transition:0.3s;
}

.nav-links a:hover{
color:#a855f7;
text-shadow:0 0 10px #a855f7;
}

/* HERO */

.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:70px;
color:#a855f7;
text-shadow:0 0 25px #a855f7;
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px #a855f7;}
to{text-shadow:0 0 35px #a855f7;}
}

.hero-buttons{
margin-top:40px;
}

.hero-buttons a{
padding:15px 35px;
background:#a855f7;
border-radius:6px;
color:white;
text-decoration:none;
margin:10px;
}

.hero-buttons a:hover{
box-shadow:0 0 20px #a855f7;
}

/* SECTIONS */

section{
padding:100px 20px;
text-align:center;
}

h2{
margin-bottom:40px;
font-size:36px;
}

/* GLASS ROSTER */

.roster{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:25px;
max-width:1200px;
margin:auto;
}

.player-card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border-radius:15px;
overflow:hidden;
transition:0.3s;
}

.player-card:hover{
transform:translateY(-8px);
box-shadow:0 0 20px #a855f7;
}

.player-card img{
width:100%;
height:200px;
object-fit:cover;
}

.player-info{
padding:15px;
}

/* VIDEO */

.video-container{
max-width:900px;
margin:60px auto;
}

.video-container video{
width:100%;
border-radius:10px;
}

/* TOURNAMENT BRACKET */

.bracket{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.match{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.1);
transition:0.3s;
}

.match:hover{
box-shadow:0 0 20px #a855f7;
}

/* FORM */

form{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:15px;
}

input,textarea{
padding:12px;
background:#111;
border:none;
border-radius:6px;
color:white;
}

button{
padding:14px;
background:#a855f7;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

/* FOOTER */

footer{
padding:30px;
text-align:center;
background:#050505;
}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<nav>

<div class="logo">
<img src="logo.png">
</div>

<div class="nav-links">
<a href="#home">Home</a>
<a href="#roster">Roster</a>
<a href="#about">About</a>
<a href="#join">Join</a>
<a href="#tournaments">Tournaments</a>
<a href="#shop">Shop</a>
</div>

</nav>

<!-- HERO -->

<section id="home" class="hero">

<h1>TEAM NOX</h1>

<div class="hero-buttons">
<a href="#roster">Roster</a>
<a href="#join">Join</a>
<a href="#tournaments">Tournaments</a>
</div>

</section>

<!-- ROSTER -->

<section id="roster">

<h2>Roster</h2>

<div class="roster">

<!-- 22 GLASS CARDS -->

<script>
for(let i=1;i<=22;i++){
document.write(`
<div class="player-card">
<img src="player${i}.jpg">
<div class="player-info">
<h3>Player ${i}</h3>
<p>Role</p>
</div>
</div>
`)
}
</script>

</div>

<div class="video-container">

<video controls>
<source src="teamvideo.mp4" type="video/mp4">
</video>

</div>

</section>

<!-- ABOUT -->

<section id="about">

<h2>About</h2>

<p>Team Nox is a competitive esports organization built for champions.</p>

</section>

<!-- JOIN -->

<section id="join">

<h2>Join Team Nox</h2>

<form id="joinForm">

<input type="text" id="username" placeholder="Username" required>
<input type="text" id="age" placeholder="Age">
<input type="text" id="game" placeholder="Game">
<textarea id="reason" placeholder="Why join?"></textarea>

<button type="submit">Send Application</button>

</form>

</section>

<!-- TOURNAMENT BRACKET -->

<section id="tournaments">

<h2>Tournament Bracket</h2>

<div class="bracket">

<div class="match">
<p>Team Nox</p>
<p>VS</p>
<p>Opponent</p>
</div>

<div class="match">
<p>Winner</p>
<p>VS</p>
<p>Opponent</p>
</div>

</div>

</section>

<section id="shop">

<h2>Shop</h2>

<p>Merch Coming Soon</p>

</section>

<footer>

<p>© 2026 Team Nox</p>

</footer>

<script>

/* PARTICLE BACKGROUND */

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<100;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
})
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#a855f7";
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;
})

requestAnimationFrame(animate);
}

animate();

/* DISCORD WEBHOOK */

document.getElementById("joinForm").addEventListener("submit",function(e){

e.preventDefault();

const webhook="PASTE_WEBHOOK";

const data={
content:
"New Team Nox Application\n"+
"Username: "+username.value+
"\nAge: "+age.value+
"\nGame: "+game.value+
"\nReason: "+reason.value
};

fetch(webhook,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

alert("Application sent!");

});

</script>

</body>
</html>
