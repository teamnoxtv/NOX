<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>NOX Admin Login</title>

<style>

/* PAGE */

body{
margin:0;
font-family:Arial;
background:#050008;
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:center;
align-items:center;

padding:18px;

background:black;

border-bottom:2px solid #7a00ff;
}

.logo{
position:absolute;
left:20px;
height:40px;
}

/* LOGIN PANEL */

.login-container{

max-width:420px;

margin:150px auto;

background:rgba(0,0,0,0.35);

border:2px solid #7a00ff;
border-radius:14px;

padding:40px;

text-align:center;

backdrop-filter:blur(10px);

}

/* TITLE */

.login-title{

font-size:36px;

margin-bottom:30px;

text-shadow:0 0 15px #7a00ff;

}

/* INPUTS */

.login-container input{

width:100%;

padding:12px;

margin-bottom:15px;

background:#0a0a0a;

border:1px solid #7a00ff;

color:white;

}

/* BUTTON */

.login-btn{

padding:12px 25px;

border:1px solid #7a00ff;

background:transparent;

color:white;

cursor:pointer;

transition:.3s;

}

.login-btn:hover{

background:#7a00ff;

box-shadow:
0 0 10px #7a00ff,
0 0 25px #7a00ff;

}

/* ERROR */

.error{
color:red;
margin-top:10px;
}

</style>

</head>

<body>


<nav class="navbar">

<a href="index.html">
<img src="assets/logo.png" class="logo">
</a>

</nav>


<div class="login-container">

<h1 class="login-title">Admin Login</h1>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button class="login-btn" onclick="login()">Login</button>

<p id="error" class="error"></p>

</div>


<script>

/* LOGIN FUNCTION */

function login(){

const user = document.getElementById("username").value
const pass = document.getElementById("password").value

/* CHANGE THESE */

const adminUser = "admin"
const adminPass = "nox2026"


if(user === adminUser && pass === adminPass){

localStorage.setItem("noxAdmin","true")

window.location.href = "admin.html"

}else{

document.getElementById("error").innerText = "Invalid login"

}

}

</script>


</body>
</html>
