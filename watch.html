<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Watch NOX</title>

<link rel="icon" type="image/png" href="assets/favicon.png">

<link rel="stylesheet" href="styles/styles.css">

<style>

/* PAGE */

.watch-page{
padding-top:140px;
text-align:center;
}

/* TITLE */

.watch-title{
font-size:60px;
text-shadow:0 0 25px #7a00ff;
margin-bottom:40px;
}

/* FEATURED VIDEO */

.featured-video{
max-width:900px;
margin:0 auto 70px auto;

background:rgba(0,0,0,0.35);
backdrop-filter:blur(10px);

border:2px solid #7a00ff;
border-radius:16px;

padding:20px;
}

.featured-video video{
width:100%;
border-radius:12px;
}

/* GRID */

.clip-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;

max-width:1100px;
margin:auto;
}

/* CLIP CARD */

.clip-card{

background:rgba(0,0,0,0.35);
backdrop-filter:blur(10px);

border:2px solid #7a00ff;
border-radius:16px;

padding:15px;

transition:.3s;
}

.clip-card video{
width:100%;
border-radius:12px;
margin-bottom:10px;
}

/* TEXT */

.clip-card h3{
margin:5px 0;
font-size:18px;
}

.clip-card p{
font-size:14px;
color:#bbb;
}

/* HOVER EFFECT */

.clip-card:hover{
transform:translateY(-8px);

box-shadow:
0 0 20px #7a00ff,
0 0 60px #7a00ff;
}
/* VIDEO BACKGROUND */

.video-background{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

z-index:-2;

overflow:hidden;

}

/* VIDEO */

.video-background video{

width:100%;
height:100%;

object-fit:cover;

filter:brightness(.35);

}

/* OVERLAY */

.video-background::after{

content:"";

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

background:linear-gradient(
rgba(10,0,20,.7),
rgba(0,0,0,.9)
);

}
/* LOADER SCREEN */

#loader{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#050008;

display:flex;
justify-content:center;
align-items:center;

z-index:9999;

transition:opacity .6s ease;

}

/* LOGO ANIMATION */

.loader-logo{

width:120px;

animation:logoPulse 2s infinite ease-in-out;

}

/* PULSE EFFECT */

@keyframes logoPulse{

0%{
transform:scale(1);
filter:drop-shadow(0 0 10px #7a00ff);
}

50%{
transform:scale(1.1);
filter:drop-shadow(0 0 25px #7a00ff);
}

100%{
transform:scale(1);
filter:drop-shadow(0 0 10px #7a00ff);
}

}
/* CUSTOM CURSOR */

.cursor{

position:fixed;

width:18px;
height:18px;

border-radius:50%;

background:#7a00ff;

box-shadow:
0 0 10px #7a00ff,
0 0 25px #7a00ff;

pointer-events:none;

transform:translate(-50%, -50%);

z-index:999;

}
</style>

</head>

<body>
<div class="cursor"></div>
<div id="loader">

<img src="assets/logo.png" class="loader-logo">

</div>

<div class="video-background">

<video autoplay muted loop playsinline>

<source src="assets/watch.mp4" type="video/mp4">

</video>

</div>

<nav class="navbar">

<a href="index.html" class="logo-link">
<img src="assets/logo.png" class="logo">
</a>

<ul class="nav-links">

<li><a href="about.html">About</a></li>
<li><a href="watch.html">Watch</a></li>
<li><a href="noxsters.html">Noxsters</a></li>
<li><a href="tournaments.html">Tournaments</a></li>
<li><a href="signup.html">Join</a></li>

</ul>

</nav>

<section class="watch-page">

<h1 class="watch-title">NOX Highlights</h1>


<!-- FEATURED VIDEO -->

<div class="featured-video">

<video controls>
<source src="assets/clips/featured.mp4" type="video/mp4">
</video>

<h3>Featured Highlight</h3>
<p>Best NOX HERO Play of the Week</p>

</div>


<!-- CLIP GRID -->

<div class="clip-grid">

<div class="clip-card">
<video controls>
<source src="assets/clips/clip1.mp4">
</video>
<h3>NO AIM</h3>
<p>Player: RAEANNE</p>
</div>

<div class="clip-card">
<video controls>
<source src="assets/clips/clip2.mp4">
</video>
<h3>EASY ACE</h3>
<p>Player: SHY</p>
</div>

<div class="clip-card">
<video controls>
<source src="assets/clips/clip3.mp4">
</video>
<h3>NO BOMB</h3>
<p>Player: CHRIZZ</p>
</div>

<div class="clip-card">
<video controls>
<source src="assets/clips/clip4.mp4">
</video>
<h3>EASY TIGER</h3>
<p>Player: NORDICA</p>
</div>

<div class="clip-card">
<video controls>
<source src="assets/clips/clip5.mp4">
</video>
<h3>POPCORN ON BBQ</h3>
<p>Player: TRAVIS</p>
</div>

<div class="clip-card">
<video controls>
<source src="assets/clips/clip6.mp4">
</video>
<h3>I LIKE CHICKEN</h3>
<p>Player: KHRISPY</p>
</div>

</div>

</section>
<div id="clip-container"></div>

<script>

const clips = JSON.parse(localStorage.getItem("noxClips")) || []

const container = document.getElementById("clip-container")

clips.forEach(clip => {

const card = document.createElement("div")

card.className = "clip-card"

card.innerHTML = `
<video controls>
<source src="${clip.url}">
</video>

<h3>${clip.title}</h3>
<p>${clip.player}</p>
`

container.appendChild(card)

})

</script>
<script src="scripts/main.js"></script>
</body>
</html>
