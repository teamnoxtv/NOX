<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Watch NOX</title>

<link rel="stylesheet" href="styles/styles.css">

<style>

/* PAGE */

.watch-page{
padding-top:140px;
text-align:center;
}

/* TITLE */

.watch-title{
font-size:60px;
text-shadow:0 0 25px #7a00ff;
margin-bottom:40px;
}

/* FEATURED VIDEO */

.featured-video{
max-width:900px;
margin:0 auto 70px auto;

background:rgba(0,0,0,0.35);
backdrop-filter:blur(10px);

border:2px solid #7a00ff;
border-radius:16px;

padding:20px;
}

.featured-video video{
width:100%;
border-radius:12px;
}

/* GRID */

.clip-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;

max-width:1100px;
margin:auto;
}

/* CLIP CARD */

.clip-card{

background:rgba(0,0,0,0.35);
backdrop-filter:blur(10px);

border:2px solid #7a00ff;
border-radius:16px;

padding:15px;

transition:.3s;
}

.clip-card video{
width:100%;
border-radius:12px;
margin-bottom:10px;
}

/* TEXT */

.clip-card h3{
margin:5px 0;
font-size:18px;
}

.clip-card p{
font-size:14px;
color:#bbb;
}

/* HOVER EFFECT */

.clip-card:hover{
transform:translateY(-8px);

box-shadow:
0 0 20px #7a00ff,
0 0 60px #7a00ff;
}

</style>

</head>

</nav>
