<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Join NOX</title>

<link rel="icon" type="image/png" href="assets/favicon.png">

<style>

/* PAGE */

body{
background:#050008;
color:white;
font-family:Arial;
margin:0;
}

/* NAVBAR */
.navbar{
display:flex;
align-items:center;
justify-content:center;

padding:15px;

background:black;

border-bottom:2px solid #7a00ff;

position:fixed;
width:100%;
top:0;
z-index:100;
}

.logo{

position:absolute;
left:20px;

top:50%;
transform:translateY(-50%);

height:40px;

}

.nav-links{
display:flex;
gap:40px;

list-style:none;

margin:0;
padding:0;
}

.nav-links a{
text-decoration:none;
color:white;
font-size:16px;
transition:.3s;
}

.nav-links a:hover{
color:#a64dff;
text-shadow:0 0 10px #7a00ff;
}

/* PAGE */

.signup-page{
padding-top:120px;
text-align:center;
}

/* TITLE */

.signup-title{
font-size:60px;
text-shadow:0 0 25px #7a00ff;
margin-bottom:40px;
}

/* FORM PANEL */

.signup-container{
max-width:600px;
margin:auto;

background:rgba(0,0,0,0.35);
backdrop-filter:blur(10px);

border:2px solid #7a00ff;
border-radius:16px;

padding:40px;
}

/* INPUTS */

.signup-container input,
.signup-container select,
.signup-container textarea{

width:100%;
padding:12px;
margin-bottom:15px;

border-radius:6px;
border:1px solid #7a00ff;

background:#0a0a0a;
color:white;
}

/* TEXTAREA */

.signup-container textarea{
height:120px;
resize:none;
}

/* BUTTON */

.signup-btn{

padding:12px 25px;

border:1px solid #7a00ff;
background:transparent;

color:white;

border-radius:6px;

cursor:pointer;
transition:.3s;
}

.signup-btn:hover{

background:#7a00ff;

box-shadow:0 0 20px #7a00ff;
}

.success{
margin-top:20px;
color:#a64dff;
}
/* VIDEO BACKGROUND */

.video-background{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

overflow:hidden;

z-index:-2;

}

/* VIDEO */

.video-background video{

width:100%;
height:100%;

object-fit:cover;

filter:brightness(.35);

}

/* PURPLE OVERLAY */

.video-background::after{

content:"";

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

background:linear-gradient(
rgba(10,0,25,.75),
rgba(0,0,0,.9)
);

}
/* LOADER SCREEN */

#loader{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#050008;

display:flex;
justify-content:center;
align-items:center;

z-index:9999;

transition:opacity .6s ease;

}

/* LOGO ANIMATION */

.loader-logo{

width:120px;

animation:logoPulse 2s infinite ease-in-out;

}

/* PULSE EFFECT */

@keyframes logoPulse{

0%{
transform:scale(1);
filter:drop-shadow(0 0 10px #7a00ff);
}

50%{
transform:scale(1.1);
filter:drop-shadow(0 0 25px #7a00ff);
}

100%{
transform:scale(1);
filter:drop-shadow(0 0 10px #7a00ff);
}

}
</style>

</head>

<body>
<div id="loader">

<img src="assets/logo.png" class="loader-logo">

</div>
<div class="video-background">

<video autoplay muted loop playsinline>

<source src="assets/sign.mp4" type="video/mp4">

</video>

</div>

<nav class="navbar">

<a href="index.html">
<img src="assets/logo.png" class="logo">
</a>

<ul class="nav-links">

<li><a href="about.html">About</a></li>
<li><a href="watch.html">Watch</a></li>
<li><a href="noxsters.html">Noxsters</a></li>
<li><a href="tournaments.html">Tournaments</a></li>
<li><a href="signup.html" class="join-btn">Join</a></li>

</ul>

</nav>


<section class="signup-page">

<h1 class="signup-title">Join NOX</h1>


<div class="signup-container">

<form id="signupForm">

<input id="name" type="text" placeholder="Name / Gamer Tag" required>

<input id="discord" type="text" placeholder="Discord Username" required>

<select id="game" required>
<option value="">Game</option>
<option>Valorant</option>
<option>Fortnite</option>
<option>Warzone</option>
<option>Other</option>
</select>

<select id="role" required>
<option value="">Role</option>
<option>Competitive Player</option>
<option>Content Creator</option>
<option>Editor</option>
<option>Community Member</option>
</select>

<input id="rank" type="text" placeholder="Current Rank">

<textarea id="message" placeholder="Why do you want to join NOX?"></textarea>

<button class="signup-btn" type="submit">Submit Application</button>

</form>

<p id="status" class="success"></p>

</div>

</section>


<script>

/* PASTE YOUR DISCORD WEBHOOK HERE */

const webhookURL = "https://discordapp.com/api/webhooks/1481934571149852672/ApzD0XiQO2IxvtOWRKhRxBfTTyQManEaaP2HxCAaDfH2VmNzaWGQc41X8jf4V2LekDqU"


document.getElementById("signupForm").addEventListener("submit", async function(e){

e.preventDefault()

const name = document.getElementById("name").value
const discord = document.getElementById("discord").value
const game = document.getElementById("game").value
const role = document.getElementById("role").value
const rank = document.getElementById("rank").value
const message = document.getElementById("message").value


const data = {

content:
`🔥 **NEW NOX APPLICATION**

👤 Name: ${name}
💬 Discord: ${discord}
🎮 Game: ${game}
🎯 Role: ${role}
🏆 Rank: ${rank}

📝 Application:
${message}`

}

await fetch(webhookURL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

document.getElementById("status").innerText="Application sent to NOX staff!"

document.getElementById("signupForm").reset()

})

</script>
<script src="scripts/main.js"></script>
</body>
</html>
