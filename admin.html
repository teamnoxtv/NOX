<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NOX Admin Panel</title>

<style>

/* PAGE */

body{
margin:0;
font-family:Arial;
background:#050008;
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:center;
align-items:center;
padding:18px;
background:black;
border-bottom:2px solid #7a00ff;
}

.logo{
position:absolute;
left:20px;
height:40px;
}

/* TITLE */

.title{
text-align:center;
margin-top:100px;
font-size:40px;
text-shadow:0 0 20px #7a00ff;
}

/* TABS */

.tabs{

display:flex;
justify-content:center;
gap:15px;
margin-top:30px;

}

.tab{

padding:10px 18px;

border:1px solid #7a00ff;
background:rgba(0,0,0,.4);

cursor:pointer;

}

.tab.active{
background:#7a00ff;
}

/* PANELS */

.panel{

display:none;

max-width:900px;
margin:30px auto;

background:rgba(0,0,0,.35);

border:2px solid #7a00ff;

padding:25px;

border-radius:12px;

}

.panel.active{
display:block;
}

/* INPUTS */

input{

width:100%;
padding:10px;
margin-bottom:10px;

background:#0a0a0a;

border:1px solid #7a00ff;

color:white;

}

/* BUTTON */

button{

padding:10px 16px;

border:1px solid #7a00ff;

background:transparent;

color:white;

cursor:pointer;

}

button:hover{

background:#7a00ff;

box-shadow:0 0 15px #7a00ff;

}

/* LIST */

.item{

display:flex;
justify-content:space-between;

border:1px solid #7a00ff;

padding:8px;
margin-top:8px;

}

/* APPROVAL */

.approve{
background:green;
border:none;
}

.reject{
background:red;
border:none;
}

/* VIDEO PREVIEW */

.preview video{
width:100%;
margin-top:10px;
}

</style>

</head>

<body>

<script>
if(localStorage.getItem("noxAdmin") !== "true"){
window.location.href="login.html"
}
</script>

<nav class="navbar">
<a href="index.html">
<img src="assets/logo.png" class="logo">
</a>
</nav>

<h1 class="title">NOX Admin Dashboard</h1>


<!-- TABS -->

<div class="tabs">

<div class="tab active" onclick="openTab('clips')">🎥 Clips</div>
<div class="tab" onclick="openTab('roster')">👤 Roster</div>
<div class="tab" onclick="openTab('applications')">📄 Applications</div>

</div>


<!-- CLIPS PANEL -->

<div id="clips" class="panel active">

<h3>Upload Clip</h3>

<input id="clipTitle" placeholder="Clip Title">
<input id="clipPlayer" placeholder="Player Name">
<input id="clipURL" placeholder="Video URL">

<button onclick="previewClip()">Preview</button>

<div class="preview" id="clipPreview"></div>

<button onclick="addClip()">Upload Clip</button>

<div id="clipList"></div>

</div>


<!-- ROSTER PANEL -->

<div id="roster" class="panel">

<h3>Add Player</h3>

<input id="playerName" placeholder="Player Name">
<input id="playerRole" placeholder="Role">

<button onclick="addPlayer()">Add Player</button>

<div id="playerList"></div>

</div>


<!-- APPLICATIONS PANEL -->

<div id="applications" class="panel">

<h3>Join Applications</h3>

<div id="applicationList"></div>

</div>


<script>

/* STORAGE */

let clips = JSON.parse(localStorage.getItem("noxClips")) || []
let players = JSON.parse(localStorage.getItem("noxPlayers")) || []
let applications = JSON.parse(localStorage.getItem("noxApplications")) || []


/* TAB SYSTEM */

function openTab(id){

document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"))
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

document.getElementById(id).classList.add("active")

event.target.classList.add("active")

}


/* CLIP PREVIEW */

function previewClip(){

const url=document.getElementById("clipURL").value

document.getElementById("clipPreview").innerHTML=
`<video controls><source src="${url}"></video>`

}


/* ADD CLIP */

function addClip(){

const title=document.getElementById("clipTitle").value
const player=document.getElementById("clipPlayer").value
const url=document.getElementById("clipURL").value

clips.push({title,player,url})

localStorage.setItem("noxClips",JSON.stringify(clips))

renderClips()

}


/* CLIP LIST */

function renderClips(){

const list=document.getElementById("clipList")
list.innerHTML=""

clips.forEach((clip,i)=>{

const div=document.createElement("div")

div.className="item"

div.innerHTML=`
${clip.title} - ${clip.player}
<button onclick="deleteClip(${i})">X</button>
`

list.appendChild(div)

})

}


function deleteClip(i){

clips.splice(i,1)

localStorage.setItem("noxClips",JSON.stringify(clips))

renderClips()

}


/* PLAYERS */

function addPlayer(){

const name=document.getElementById("playerName").value
const role=document.getElementById("playerRole").value

players.push({name,role})

localStorage.setItem("noxPlayers",JSON.stringify(players))

renderPlayers()

}


function renderPlayers(){

const list=document.getElementById("playerList")

list.innerHTML=""

players.forEach((p,i)=>{

const div=document.createElement("div")

div.className="item"

div.innerHTML=`
${p.name} - ${p.role}
<button onclick="deletePlayer(${i})">X</button>
`

list.appendChild(div)

})

}


function deletePlayer(i){

players.splice(i,1)

localStorage.setItem("noxPlayers",JSON.stringify(players))

renderPlayers()

}


/* APPLICATIONS */

function renderApplications(){

const list=document.getElementById("applicationList")

applications.forEach((app,i)=>{

const div=document.createElement("div")

div.className="item"

div.innerHTML=`
${app.name} - ${app.game}

<div>
<button class="approve">Approve</button>
<button class="reject">Reject</button>
</div>
`

list.appendChild(div)

})

}


/* LOAD DATA */

renderClips()
renderPlayers()
renderApplications()

</script>

</body>
</html>
