<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NOX Admin Dashboard</title>

<style>

/* PAGE */

body{
margin:0;
font-family:Arial;
background:#050008;
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:center;
align-items:center;
padding:18px;
background:black;
border-bottom:2px solid #7a00ff;
}

.logo{
position:absolute;
left:20px;
height:40px;
}

/* PAGE TITLE */

.title{
text-align:center;
margin-top:110px;
font-size:48px;
text-shadow:0 0 15px #7a00ff;
}

/* DASHBOARD GRID */

.dashboard{
max-width:1100px;
margin:40px auto;

display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:25px;
}

/* PANELS */

.panel{

background:rgba(0,0,0,.35);

border:2px solid #7a00ff;
border-radius:14px;

padding:25px;

backdrop-filter:blur(10px);

}

/* INPUTS */

.panel input,
.panel textarea{

width:100%;

padding:10px;

margin-bottom:12px;

background:#0a0a0a;
border:1px solid #7a00ff;
color:white;

}

/* BUTTON */

.btn{

padding:10px 18px;

border:1px solid #7a00ff;
background:transparent;
color:white;

cursor:pointer;

transition:.3s;

}

.btn:hover{

background:#7a00ff;
box-shadow:0 0 20px #7a00ff;

}

/* ITEM LIST */

.list-item{

display:flex;
justify-content:space-between;

border:1px solid #7a00ff;

padding:8px;
margin-top:8px;

}

.delete{
background:red;
border:none;
color:white;
cursor:pointer;
}

</style>

</head>

<body>


<script>
/* PROTECT PAGE */

if(localStorage.getItem("noxAdmin") !== "true"){
window.location.href="login.html"
}
</script>


<nav class="navbar">

<a href="index.html">
<img src="assets/logo.png" class="logo">
</a>

</nav>


<h1 class="title">NOX Admin Dashboard</h1>


<div class="dashboard">

<!-- CLIPS -->

<div class="panel">

<h3>Upload Clip</h3>

<input id="clipTitle" placeholder="Clip Title">
<input id="clipPlayer" placeholder="Player Name">
<input id="clipURL" placeholder="Clip Video URL">

<button class="btn" onclick="addClip()">Upload</button>

<div id="clipList"></div>

</div>


<!-- ROSTER -->

<div class="panel">

<h3>Add Player</h3>

<input id="playerName" placeholder="Player Name">
<input id="playerRole" placeholder="Role">

<button class="btn" onclick="addPlayer()">Add Player</button>

<div id="playerList"></div>

</div>


<!-- TOURNAMENTS -->

<div class="panel">

<h3>Add Tournament</h3>

<input id="tournamentName" placeholder="Tournament Name">
<input id="tournamentGame" placeholder="Game">
<input id="tournamentDate" placeholder="Date">

<button class="btn" onclick="addTournament()">Add</button>

<div id="tournamentList"></div>

</div>


<!-- NEWS -->

<div class="panel">

<h3>Post News</h3>

<input id="newsTitle" placeholder="News Title">
<textarea id="newsText" placeholder="News content"></textarea>

<button class="btn" onclick="addNews()">Post</button>

<div id="newsList"></div>

</div>


<!-- APPLICATIONS -->

<div class="panel">

<h3>Join Applications</h3>

<div id="applicationList"></div>

</div>


</div>


<script>

/* STORAGE */

let clips = JSON.parse(localStorage.getItem("noxClips")) || []
let players = JSON.parse(localStorage.getItem("noxPlayers")) || []
let tournaments = JSON.parse(localStorage.getItem("noxTournaments")) || []
let news = JSON.parse(localStorage.getItem("noxNews")) || []
let applications = JSON.parse(localStorage.getItem("noxApplications")) || []


/* CLIPS */

function renderClips(){

const list=document.getElementById("clipList")
list.innerHTML=""

clips.forEach((clip,i)=>{

const div=document.createElement("div")
div.className="list-item"

div.innerHTML=`
${clip.title} - ${clip.player}
<button class="delete" onclick="deleteClip(${i})">X</button>
`

list.appendChild(div)

})

}

function addClip(){

const title=document.getElementById("clipTitle").value
const player=document.getElementById("clipPlayer").value
const url=document.getElementById("clipURL").value

clips.push({title,player,url})

localStorage.setItem("noxClips",JSON.stringify(clips))

renderClips()

}

function deleteClip(i){

clips.splice(i,1)

localStorage.setItem("noxClips",JSON.stringify(clips))

renderClips()

}


/* PLAYERS */

function renderPlayers(){

const list=document.getElementById("playerList")
list.innerHTML=""

players.forEach((p,i)=>{

const div=document.createElement("div")
div.className="list-item"

div.innerHTML=`
${p.name} - ${p.role}
<button class="delete" onclick="deletePlayer(${i})">X</button>
`

list.appendChild(div)

})

}

function addPlayer(){

const name=document.getElementById("playerName").value
const role=document.getElementById("playerRole").value

players.push({name,role})

localStorage.setItem("noxPlayers",JSON.stringify(players))

renderPlayers()

}

function deletePlayer(i){

players.splice(i,1)

localStorage.setItem("noxPlayers",JSON.stringify(players))

renderPlayers()

}


/* TOURNAMENTS */

function renderTournaments(){

const list=document.getElementById("tournamentList")
list.innerHTML=""

tournaments.forEach((t,i)=>{

const div=document.createElement("div")
div.className="list-item"

div.innerHTML=`
${t.name} (${t.game})
<button class="delete" onclick="deleteTournament(${i})">X</button>
`

list.appendChild(div)

})

}

function addTournament(){

const name=document.getElementById("tournamentName").value
const game=document.getElementById("tournamentGame").value
const date=document.getElementById("tournamentDate").value

tournaments.push({name,game,date})

localStorage.setItem("noxTournaments",JSON.stringify(tournaments))

renderTournaments()

}

function deleteTournament(i){

tournaments.splice(i,1)

localStorage.setItem("noxTournaments",JSON.stringify(tournaments))

renderTournaments()

}


/* NEWS */

function renderNews(){

const list=document.getElementById("newsList")
list.innerHTML=""

news.forEach((n,i)=>{

const div=document.createElement("div")
div.className="list-item"

div.innerHTML=`
${n.title}
<button class="delete" onclick="deleteNews(${i})">X</button>
`

list.appendChild(div)

})

}

function addNews(){

const title=document.getElementById("newsTitle").value
const text=document.getElementById("newsText").value

news.push({title,text})

localStorage.setItem("noxNews",JSON.stringify(news))

renderNews()

}

function deleteNews(i){

news.splice(i,1)

localStorage.setItem("noxNews",JSON.stringify(news))

renderNews()

}


/* APPLICATIONS */

function renderApplications(){

const list=document.getElementById("applicationList")
list.innerHTML=""

applications.forEach(app=>{

const div=document.createElement("div")
div.className="list-item"

div.innerHTML=`
${app.name} - ${app.game}
`

list.appendChild(div)

})

}


/* LOAD DATA */

renderClips()
renderPlayers()
renderTournaments()
renderNews()
renderApplications()

</script>


</body>
</html>
