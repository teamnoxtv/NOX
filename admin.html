<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NOX Admin</title>

<style>

/* PAGE */

body{
margin:0;
font-family:Arial;
background:#050008;
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:center;
align-items:center;
padding:18px;
background:black;
border-bottom:2px solid #7a00ff;
}

.logo{
position:absolute;
left:20px;
height:40px;
}

/* TITLE */

.title{
text-align:center;
margin-top:110px;
font-size:42px;
text-shadow:0 0 15px #7a00ff;
}

/* GRID */

.dashboard{

max-width:1100px;
margin:40px auto;

display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));

gap:25px;

}

/* PANEL */

.panel{

background:rgba(0,0,0,.35);

border:2px solid #7a00ff;
border-radius:14px;

padding:25px;

backdrop-filter:blur(10px);

}

/* INPUTS */

.panel input{

width:100%;
padding:10px;
margin-bottom:10px;

background:#0a0a0a;

border:1px solid #7a00ff;

color:white;

}

/* BUTTON */

.btn{

padding:10px 18px;

border:1px solid #7a00ff;

background:transparent;

color:white;

cursor:pointer;

transition:.3s;

}

.btn:hover{

background:#7a00ff;

box-shadow:0 0 20px #7a00ff;

}

/* LIST ITEMS */

.item{

display:flex;
justify-content:space-between;

border:1px solid #7a00ff;

padding:8px;
margin-top:8px;

}

.delete{
background:red;
border:none;
color:white;
cursor:pointer;
}

</style>

</head>

<body>


<script>

/* ADMIN PROTECTION */

if(localStorage.getItem("noxAdmin") !== "true"){
window.location.href="login.html"
}

</script>


<nav class="navbar">

<a href="index.html">
<img src="assets/logo.png" class="logo">
</a>

</nav>


<h1 class="title">NOX Admin Dashboard</h1>


<div class="dashboard">


<!-- UPLOAD CLIPS -->

<div class="panel">

<h3>Upload Clip</h3>

<input id="clipTitle" placeholder="Clip Title">

<input id="clipPlayer" placeholder="Player Name">

<input id="clipURL" placeholder="Video URL">

<button class="btn" onclick="addClip()">Upload</button>

<div id="clipList"></div>

</div>


<!-- ADD ROSTER PLAYER -->

<div class="panel">

<h3>Add Player to Roster</h3>

<input id="playerName" placeholder="Player Name">

<input id="playerRole" placeholder="Role">

<button class="btn" onclick="addPlayer()">Add Player</button>

<div id="playerList"></div>

</div>


<!-- VIEW APPLICATIONS -->

<div class="panel">

<h3>Join Applications</h3>

<div id="applicationList"></div>

</div>


</div>


<script>

/* STORAGE */

let clips = JSON.parse(localStorage.getItem("noxClips")) || []
let players = JSON.parse(localStorage.getItem("noxPlayers")) || []
let applications = JSON.parse(localStorage.getItem("noxApplications")) || []


/* CLIPS */

function renderClips(){

const list=document.getElementById("clipList")
list.innerHTML=""

clips.forEach((clip,i)=>{

const div=document.createElement("div")
div.className="item"

div.innerHTML=`
${clip.title} - ${clip.player}
<button class="delete" onclick="deleteClip(${i})">X</button>
`

list.appendChild(div)

})

}

function addClip(){

const title=document.getElementById("clipTitle").value
const player=document.getElementById("clipPlayer").value
const url=document.getElementById("clipURL").value

clips.push({title,player,url})

localStorage.setItem("noxClips",JSON.stringify(clips))

renderClips()

}

function deleteClip(i){

clips.splice(i,1)

localStorage.setItem("noxClips",JSON.stringify(clips))

renderClips()

}


/* PLAYERS */

function renderPlayers(){

const list=document.getElementById("playerList")
list.innerHTML=""

players.forEach((p,i)=>{

const div=document.createElement("div")
div.className="item"

div.innerHTML=`
${p.name} - ${p.role}
<button class="delete" onclick="deletePlayer(${i})">X</button>
`

list.appendChild(div)

})

}

function addPlayer(){

const name=document.getElementById("playerName").value
const role=document.getElementById("playerRole").value

players.push({name,role})

localStorage.setItem("noxPlayers",JSON.stringify(players))

renderPlayers()

}

function deletePlayer(i){

players.splice(i,1)

localStorage.setItem("noxPlayers",JSON.stringify(players))

renderPlayers()

}


/* APPLICATIONS */

function renderApplications(){

const list=document.getElementById("applicationList")

applications.forEach(app=>{

const div=document.createElement("div")

div.className="item"

div.innerHTML=`
${app.name} - ${app.game}
`

list.appendChild(div)

})

}


/* LOAD DATA */

renderClips()
renderPlayers()
renderApplications()

</script>


</body>
</html>
