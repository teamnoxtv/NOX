<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>NOX Admin Panel</title>

<style>

/* PAGE */

body{
margin:0;
font-family:Arial;
background:#050008;
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:center;
align-items:center;

padding:18px;

background:black;

border-bottom:2px solid #7a00ff;
}

.logo{
position:absolute;
left:20px;
height:40px;
}

/* PAGE TITLE */

.admin-title{
text-align:center;
margin-top:120px;

font-size:50px;

text-shadow:0 0 20px #7a00ff;
}

/* PANEL */

.admin-panel{

max-width:800px;
margin:40px auto;

background:rgba(0,0,0,0.35);

border:2px solid #7a00ff;
border-radius:14px;

padding:30px;

backdrop-filter:blur(10px);

}

/* INPUTS */

.admin-panel input{

width:100%;
padding:12px;

margin-bottom:15px;

background:#0a0a0a;

border:1px solid #7a00ff;

color:white;
}

/* BUTTON */

.admin-btn{

padding:10px 20px;

border:1px solid #7a00ff;

background:transparent;

color:white;

cursor:pointer;

transition:.3s;

}

.admin-btn:hover{

background:#7a00ff;

box-shadow:0 0 20px #7a00ff;

}

/* CLIP LIST */

.clip-list{
margin-top:40px;
}

.clip-item{

display:flex;
justify-content:space-between;

background:rgba(0,0,0,.4);

border:1px solid #7a00ff;

padding:10px;
margin-bottom:10px;

}

.delete-btn{

background:red;
border:none;

color:white;

padding:6px 10px;

cursor:pointer;

}

</style>

</head>


<body>


<script>

/* PROTECT PAGE */

if(localStorage.getItem("noxAdmin") !== "true"){
window.location.href="login.html"
}

</script>


<nav class="navbar">

<a href="index.html">
<img src="assets/logo.png" class="logo">
</a>

</nav>


<h1 class="admin-title">NOX Admin Panel</h1>


<div class="admin-panel">

<h3>Upload Clip</h3>

<input id="clipTitle" placeholder="Clip Title">

<input id="playerName" placeholder="Player Name">

<input id="clipURL" placeholder="Video URL (YouTube or MP4 link)">

<button class="admin-btn" onclick="addClip()">Upload Clip</button>


<div class="clip-list" id="clipList"></div>

<br>

<button class="admin-btn" onclick="logout()">Logout</button>

</div>


<script>

/* CLIP STORAGE */

let clips = JSON.parse(localStorage.getItem("noxClips")) || []


function renderClips(){

const list = document.getElementById("clipList")

list.innerHTML=""

clips.forEach((clip,index)=>{

const div = document.createElement("div")

div.className="clip-item"

div.innerHTML = `
<span>${clip.title} - ${clip.player}</span>
<button class="delete-btn" onclick="deleteClip(${index})">Delete</button>
`

list.appendChild(div)

})

}


function addClip(){

const title = document.getElementById("clipTitle").value
const player = document.getElementById("playerName").value
const url = document.getElementById("clipURL").value

if(!title || !player || !url) return

clips.push({title,player,url})

localStorage.setItem("noxClips",JSON.stringify(clips))

renderClips()

document.getElementById("clipTitle").value=""
document.getElementById("playerName").value=""
document.getElementById("clipURL").value=""

}


function deleteClip(index){

clips.splice(index,1)

localStorage.setItem("noxClips",JSON.stringify(clips))

renderClips()

}


function logout(){

localStorage.removeItem("noxAdmin")

window.location.href="index.html"

}

renderClips()

</script>


</body>
</html>
